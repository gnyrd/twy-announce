name: Update TWY Docs

on:
  push:
    branches: [main]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get change summary
        id: changes
        run: |
          DIFF=$(git diff HEAD~1 --stat)
          DIFF_DETAIL=$(git diff HEAD~1 -- '*.py' '*.md' '*.html' '*.yml' '*.yaml' '*.json' '*.toml' '*.cfg' '*.env*' | head -c 12000)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          {
            echo 'summary<<CHANGES_EOF'
            echo "Commit: $COMMIT_MSG"
            echo ""
            echo "Changed files:"
            echo "$DIFF"
            echo ""
            echo "Diff detail:"
            echo "$DIFF_DETAIL"
            echo 'CHANGES_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: warpdotdev/oz-agent-action@main
        with:
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          prompt: |
            You are a documentation maintenance agent. A push was made to the repo `${{ github.repository }}`.

            ## Changes
            ${{ steps.changes.outputs.summary }}

            ## Your task
            Update the documentation in the `twy-overview` repo to reflect these changes.
            The twy-overview repo is already checked out in your environment.

            ### Documentation structure
            - `docs/technical/` — developer-level technical reference (one .md per source repo, plus architecture.md, deployment.md, environment-variables.md)
            - `docs/user-guide/` — end-user how-to guides (task-oriented, non-technical)

            ### Rules
            1. **Technical docs get everything.** All changes should be reflected in the technical docs.
            2. **User guide skips preview features.** If a feature is gated behind the cookie-based `{% if preview %}` pattern (a preview cookie toggle in the Flask app), do NOT add it to the user guide. It belongs only in the technical docs, clearly marked as preview.
            3. **Be surgical.** Only update docs that are actually affected by the changes. Do not rewrite entire documents.
            4. **Preserve style.** Match the existing tone, structure, and formatting of each doc file.
            5. **Cross-references.** If changes affect architecture (new services, changed ports, new dependencies), update `architecture.md`. If new env vars are added, update `environment-variables.md`.
            6. **No fluff.** Do not add speculative documentation. Only document what the code actually does.

            ### Repo-to-doc mapping
            The source repo `${{ github.repository }}` maps to:
            - Technical doc: `docs/technical/` (filename matches the repo name without the `gnyrd/` prefix, e.g. `twy-clips.md`)
            - User guide: check existing files in `docs/user-guide/` for relevant pages

            After making changes, commit and push to main with a message like:
            "docs: update [repo-name] docs — [brief summary of what changed]"

            If the changes don't affect documentation (e.g. only whitespace, CI config, or test-only changes), do nothing and explain why.
          environment: 0Udatpt3mJh5FaI8XrJVEY
